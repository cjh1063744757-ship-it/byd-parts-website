<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" width="340" height="90">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A6B"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD59E"/>
      <stop offset="100%" style="stop-color:#FFC07A"/>
    </linearGradient>
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="340" height="90" rx="12" fill="url(#bg)"/>

  <!-- ── Q版小人 (center-left at x=46, y=45) ── -->
  <g transform="translate(46,45)">

    <!-- Mechanic cap (鸭舌帽) -->
    <!-- Cap top -->
    <ellipse cx="0" cy="-26" rx="13" ry="7" fill="#1D4ED8"/>
    <!-- Cap body -->
    <rect x="-13" y="-26" width="26" height="10" rx="3" fill="#1D4ED8"/>
    <!-- Cap brim (visor) -->
    <ellipse cx="6" cy="-18" rx="11" ry="3.5" fill="#1E40AF"/>
    <!-- Cap stripe -->
    <rect x="-13" y="-22" width="26" height="3" rx="1" fill="#3B82F6" opacity="0.5"/>
    <!-- Cap button top -->
    <circle cx="0" cy="-32" r="2" fill="#3B82F6"/>

    <!-- Head (大圆头) -->
    <circle cx="0" cy="-12" r="13" fill="url(#skinGrad)"/>
    <!-- Cheeks -->
    <circle cx="-7" cy="-9" r="4" fill="#FCA5A5" opacity="0.5"/>
    <circle cx="7" cy="-9" r="4" fill="#FCA5A5" opacity="0.5"/>
    <!-- Eyes -->
    <circle cx="-4.5" cy="-13" r="2.5" fill="#1E3A5F"/>
    <circle cx="4.5" cy="-13" r="2.5" fill="#1E3A5F"/>
    <!-- Eye shine -->
    <circle cx="-3.5" cy="-14" r="1" fill="white"/>
    <circle cx="5.5" cy="-14" r="1" fill="white"/>
    <!-- Smile -->
    <path d="M -5 -7 Q 0 -3 5 -7" stroke="#C2440A" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Body (工装) -->
    <rect x="-10" y="2" width="20" height="20" rx="5" fill="url(#suitGrad)"/>
    <!-- Overalls strap -->
    <rect x="-3" y="1" width="6" height="22" rx="3" fill="#60A5FA" opacity="0.5"/>
    <!-- Collar -->
    <path d="M -5 2 Q 0 7 5 2" fill="#93C5FD" opacity="0.6"/>

    <!-- Left arm (raised holding wrench) -->
    <rect x="-22" y="-8" width="14" height="7" rx="3.5" fill="url(#skinGrad)" transform="rotate(-40 -15 -4)"/>
    <!-- Left hand -->
    <circle cx="-23" cy="-16" r="4" fill="url(#skinGrad)"/>

    <!-- Wrench (扳手) -->
    <g transform="translate(-28,-22) rotate(-30)">
      <rect x="-2" y="-14" width="5" height="22" rx="2.5" fill="#9CA3AF"/>
      <circle cx="0.5" cy="-14" r="6" fill="none" stroke="#6B7280" stroke-width="4"/>
      <circle cx="0.5" cy="-14" r="2.5" fill="#1B3A6B"/>
      <rect x="-5" y="-18" width="5.5" height="9" fill="#1B3A6B"/>
    </g>

    <!-- Right arm (down) -->
    <rect x="10" y="4" width="12" height="7" rx="3.5" fill="url(#skinGrad)" transform="rotate(20 16 8)"/>
    <!-- Right hand -->
    <circle cx="20" cy="12" r="4" fill="url(#skinGrad)"/>

    <!-- Legs -->
    <rect x="-9" y="22" width="7" height="14" rx="3.5" fill="#1D4ED8"/>
    <rect x="2" y="22" width="7" height="14" rx="3.5" fill="#1D4ED8"/>
    <!-- Boots -->
    <ellipse cx="-5.5" cy="36" rx="6" ry="3.5" fill="#374151"/>
    <ellipse cx="5.5" cy="36" rx="6" ry="3.5" fill="#374151"/>

  </g>

  <!-- Divider -->
  <line x1="82" y1="12" x2="82" y2="78" stroke="#60A5FA" stroke-width="1" opacity="0.3"/>

  <!-- CM large text -->
  <text x="94" y="40" font-family="Arial Black, Arial" font-weight="900" font-size="26" fill="#FFFFFF" letter-spacing="3">CM</text>

  <!-- Accent line -->
  <rect x="94" y="44" width="210" height="2" fill="#3B82F6" rx="1" opacity="0.5"/>

  <!-- IMPORT & EXPORT -->
  <text x="94" y="59" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#93C5FD" letter-spacing="2">IMPORT &amp; EXPORT</text>

  <!-- Tagline -->
  <text x="94" y="73" font-family="Arial, sans-serif" font-size="8" fill="#60A5FA" letter-spacing="1" opacity="0.8">AUTOMOTIVE SPARE PARTS</text>

</svg>
